<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GYMLORD 회원관리</title>
<style>
  :root{
    --forest:#0E1714; --forest2:#152420; --brass:#B08D57; --brass-dim:#8a6e43;
    --cream:#F5F1E8; --muted:#8fa39a; --line:#24332d; --danger:#c4624f; --ok:#5a9e7a;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--forest);color:var(--cream);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",sans-serif;}
  button{font-family:inherit;cursor:pointer}
  input{font-family:inherit}
  .wrap{max-width:1100px;margin:0 auto;padding:0 16px}
  .top{display:flex;align-items:center;justify-content:space-between;
    padding:16px;border-bottom:1px solid var(--line);background:var(--forest2);position:sticky;top:0;z-index:10}
  .logo{font-family:"Cormorant Garamond",Georgia,serif;font-size:24px;font-weight:700;letter-spacing:1px;color:var(--brass)}
  .logo small{display:block;font-size:10px;letter-spacing:3px;color:var(--muted);font-family:sans-serif}
  .btn{background:var(--brass);color:#1b1205;border:none;border-radius:8px;padding:9px 16px;font-weight:700}
  .btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
  .btn.sm{padding:6px 10px;font-size:13px}
  .stats{display:flex;gap:12px;flex-wrap:wrap;margin:18px 0}
  .stat{flex:1;min-width:120px;background:var(--forest2);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .stat .n{font-size:26px;font-weight:800;color:var(--cream)}
  .stat .l{font-size:12px;color:var(--muted);margin-top:2px}
  .bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:10px 0 14px}
  .tabs{display:flex;gap:6px;flex-wrap:wrap}
  .tab{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:20px;padding:7px 14px;font-size:14px}
  .tab.on{background:var(--brass);color:#1b1205;border-color:var(--brass);font-weight:700}
  .search{flex:1;min-width:180px;background:var(--forest2);border:1px solid var(--line);border-radius:10px;
    padding:10px 14px;color:var(--cream);font-size:15px}
  .list{background:var(--forest2);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .row{display:grid;grid-template-columns:34px 44px 66px 1.1fr 54px 60px 1.2fr;gap:8px;padding:12px 16px;
    border-bottom:1px solid var(--line);align-items:center;cursor:pointer}
  .row input[type=checkbox]{accent-color:var(--brass);width:15px;height:15px;cursor:pointer}
  .row:last-child{border-bottom:none}
  .row:hover{background:#1a2c26}
  .row.head{cursor:default;color:var(--muted);font-size:12px;font-weight:700;letter-spacing:.5px;background:#11201b}
  .row.prod{grid-template-columns:1.5fr 70px 60px 72px 1fr 72px}
  .row.prodedit{grid-template-columns:1.6fr 110px 70px 80px 84px 52px 110px 110px 44px;min-width:880px}
  .row.logrow{grid-template-columns:132px 130px 1fr 110px}
  .logtag{display:inline-block;font-size:12px;font-weight:700;padding:2px 9px;border-radius:20px;background:rgba(143,163,154,.14);color:var(--muted);white-space:nowrap}
  .logtag.ok{background:rgba(90,158,122,.16);color:#7dc4a0}
  .logtag.danger{background:rgba(196,98,79,.15);color:#d98b7a}
  /* 홈 대시보드 */
  .dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:18px;margin-top:4px}
  .dash-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 2px;border-bottom:1px solid var(--line);cursor:pointer}
  .dash-row:last-child{border-bottom:none}
  .dash-row:hover b{color:var(--brass)}
  /* 좌측 사이드바 레이아웃 (BroJ 스타일) */
  .shell{display:flex;min-height:100vh}
  .side{width:210px;flex:0 0 210px;background:var(--forest2);border-right:1px solid var(--line);
    position:sticky;top:0;height:100vh;display:flex;flex-direction:column;padding:20px 12px 16px;z-index:12}
  .side .logo{padding:2px 10px 20px}
  .side-nav{display:flex;flex-direction:column;gap:3px}
  .nav-it{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:none;border:none;
    color:var(--muted);padding:11px 13px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
  .nav-it:hover{background:#1a2c26;color:var(--cream)}
  .nav-it.on{background:rgba(176,141,87,.14);color:var(--brass)}
  .nav-ic{width:20px;text-align:center;font-size:15px;filter:grayscale(35%)}
  .side-spacer{flex:1}
  .main{flex:1;min-width:0;padding:0 26px 30px}
  .main>div{max-width:1240px;margin:0 auto}
  @media(max-width:860px){
    .shell{flex-direction:column}
    .side{width:100%;flex:none;height:auto;position:sticky;top:0;flex-direction:row;align-items:center;
      padding:10px 12px;border-right:none;border-bottom:1px solid var(--line);overflow-x:auto;gap:4px}
    .side .logo{padding:0 12px 0 0;white-space:nowrap}
    .side .logo small{display:none}
    .side-nav{flex-direction:row;gap:2px}
    .nav-it{width:auto;padding:8px 10px;white-space:nowrap;font-size:14px}
    .side-spacer{display:none}
    .side>.btn{width:auto !important;white-space:nowrap;margin-left:6px}
    .main{padding:0 14px 30px}
    .mpage{left:0}
    .row.logrow{grid-template-columns:110px 100px 1fr;} .row.logrow>div:last-child{display:none}
  }
  .name{font-weight:700}
  .badge{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;font-weight:700}
  .b-활성{background:rgba(90,158,122,.18);color:#7dc4a0}
  .b-만료{background:rgba(196,98,79,.15);color:#d98b7a}
  .b-미등록,.b-예정,.b-홀딩{background:rgba(143,163,154,.15);color:var(--muted)}
  .b-임박{background:rgba(224,162,60,.16);color:#e0a23c}
  .phone{color:var(--muted);font-variant-numeric:tabular-nums;font-size:14px}
  .muted{color:var(--muted)}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:20}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(460px,92vw);background:var(--forest2);
    border-left:1px solid var(--line);z-index:21;overflow-y:auto;padding:22px}
  .drawer h2{margin:0 0 2px;font-size:22px}
  .sec{margin-top:20px}
  .sec h3{font-size:12px;letter-spacing:1px;color:var(--brass);margin:0 0 8px;text-transform:uppercase}
  .card{background:var(--forest);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:8px}
  .kv{display:flex;justify-content:space-between;font-size:14px;padding:3px 0}
  .kv b{color:var(--cream)} .kv span{color:var(--muted)}
  .gauge{height:7px;background:#0a120f;border-radius:6px;overflow:hidden;margin-top:7px}
  .gauge>i{display:block;height:100%;background:var(--brass)}
  /* 회원 상세 페이지 (BroJ 스타일 풀페이지) */
  .mpage{position:fixed;top:0;right:0;bottom:0;left:210px;background:var(--forest);z-index:21;overflow-y:auto}
  .mpage-top{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;
    padding:14px 22px;background:var(--forest2);border-bottom:1px solid var(--line)}
  .mpage-top h2{margin:0;font-size:20px;display:flex;align-items:center;gap:8px}
  .mpage-close{background:none;border:none;color:var(--muted);font-size:24px;line-height:1;cursor:pointer;padding:0 6px}
  .mpage-close:hover{color:var(--cream)}
  .mp-body{max-width:1200px;margin:0 auto;padding:22px;display:grid;grid-template-columns:340px 1fr;gap:22px;align-items:start}
  .mp-left{background:var(--forest2);border:1px solid var(--line);border-radius:14px;padding:22px;position:sticky;top:78px}
  .mp-avatar{width:92px;height:92px;border-radius:50%;background:linear-gradient(135deg,#1e332b,#2a4034);
    display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:var(--brass);
    margin:0 auto 14px;border:1px solid var(--line)}
  .mp-name{text-align:center;font-size:21px;font-weight:800;margin-bottom:10px}
  .mp-name small{color:var(--muted);font-weight:600;font-size:15px}
  .mp-chips{display:flex;gap:6px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
  .mp-acts{display:flex;gap:8px;margin-bottom:16px}
  .mp-info{border-top:1px solid var(--line);padding-top:12px}
  .mp-info .kv{padding:6px 0;gap:14px}
  .mp-info .kv b{text-align:right}
  .mp-grid{display:grid;grid-template-columns:1fr;gap:18px;min-width:0}
  .mp-cardbox{background:var(--forest2);border:1px solid var(--line);border-radius:14px;padding:20px;min-width:0}
  .mp-cardbox>h3{font-size:13px;letter-spacing:1px;color:var(--brass);margin:0 0 14px;text-transform:uppercase;
    display:flex;justify-content:space-between;align-items:center;gap:10px}
  .ms-row{background:var(--forest);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer}
  .ms-row:hover{border-color:var(--brass-dim)}
  .dday{font-size:12px;font-weight:700;padding:2px 9px;border-radius:20px;background:rgba(176,141,87,.16);color:var(--brass);white-space:nowrap}
  .dday.expired{background:rgba(196,98,79,.15);color:#d98b7a}
  .ptable{width:100%;border-collapse:collapse;font-size:13px}
  .ptable th{color:var(--muted);text-align:left;font-weight:600;padding:6px 8px;border-bottom:1px solid var(--line);font-size:12px}
  .ptable td{padding:9px 8px;border-bottom:1px solid var(--line);color:var(--cream)}
  .ptable tr:last-child td{border-bottom:none}
  @media(max-width:860px){ .mp-body{grid-template-columns:1fr} .mp-left{position:static} }
  .center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .panel{width:100%;max-width:380px;background:var(--forest2);border:1px solid var(--line);border-radius:16px;padding:28px}
  .panel label{display:block;font-size:13px;color:var(--muted);margin:12px 0 5px}
  .panel input{width:100%;background:var(--forest);border:1px solid var(--line);border-radius:9px;padding:11px 13px;color:var(--cream);font-size:15px}
  .panel .btn{width:100%;margin-top:18px;padding:12px}
  .err{color:var(--danger);font-size:13px;margin-top:10px;min-height:18px}
  .link{background:none;border:none;color:var(--brass);font-size:13px;margin-top:14px;text-decoration:underline}
  .empty{padding:50px 20px;text-align:center;color:var(--muted)}
  .nav{display:flex;gap:18px;margin:14px 0 4px;border-bottom:1px solid var(--line)}
  .nav button{background:none;border:none;color:var(--muted);padding:10px 2px;font-size:15px;font-weight:700;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer}
  .nav button.on{color:var(--brass);border-color:var(--brass)}
  .mini{font-size:10px;padding:1px 6px;border-radius:10px;margin-left:4px;font-weight:700}
  .mini.예약{background:rgba(176,141,87,.2);color:var(--brass)}
  .mini.완료{background:rgba(90,158,122,.2);color:#7dc4a0}
  .mini.휴강{background:rgba(143,163,154,.18);color:var(--muted)}
  .mini.노쇼{background:rgba(196,98,79,.18);color:#d98b7a}
  .cal-head{display:flex;align-items:center;gap:10px;margin:16px 0 10px;position:relative}
  .cal-head .mtitle{font-size:20px;font-weight:800;min-width:130px;text-align:center}
  .autobar{background:rgba(90,158,122,.14);color:#7dc4a0;border:1px solid #2c5340;border-radius:8px;padding:8px 12px;font-size:13px;margin-bottom:10px}
  .trainer-legend{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 12px;align-items:center}
  .tl-chip{display:inline-flex;align-items:center;gap:6px;background:var(--forest2);border:1px solid var(--line);color:var(--muted);padding:5px 11px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;transition:all .12s}
  .tl-chip:hover{color:var(--cream);border-color:var(--brass)}
  .tl-chip.on{border-color:var(--brass);color:var(--cream)}
  .tl-chip>i{width:11px;height:11px;border-radius:50%;flex:0 0 11px;box-shadow:0 0 0 1px rgba(0,0,0,.25) inset}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:40px}
  .cal-dow{background:#11201b;color:var(--muted);text-align:center;padding:7px 0;font-size:12px;font-weight:700}
  .cal-cell{background:var(--forest2);min-height:104px;padding:5px 6px;cursor:pointer}
  .cal-cell:hover{background:#18352b}
  .cal-cell.other{opacity:.35}
  .cal-dnum{font-size:12px;color:var(--cream);font-weight:700;display:inline-block}
  .cal-cell.sun .cal-dnum{color:#d98b7a}
  .cal-cell.today .cal-dnum{background:var(--brass);color:#1b1205;border-radius:50%;width:20px;height:20px;text-align:center;line-height:20px}
  .cal-week .cal-cell{min-height:420px}
  .cal-week .cal-items{max-height:none}
  .cal-week .cal-dow{padding:9px 0;font-size:13px}
  .chip{display:block;width:100%;text-align:left;border:none;border-left:3px solid var(--brass);background:#0e211b;color:var(--cream);font-size:11px;padding:2px 5px;margin-top:3px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:context-menu}
  .chip.완료{border-color:#5a9e7a;color:#7dc4a0}
  .chip.휴강{border-color:#7a8a84;color:var(--muted);text-decoration:line-through}
  .chip.노쇼{border-color:#c4624f;color:#d98b7a}
  .ctx{position:fixed;background:var(--forest2);border:1px solid var(--line);border-radius:8px;z-index:40;min-width:150px;box-shadow:0 10px 34px rgba(0,0,0,.55);overflow:hidden}
  .ctx button{display:block;width:100%;text-align:left;background:none;border:none;color:var(--cream);padding:10px 14px;font-size:14px;cursor:pointer}
  .ctx button:hover{background:#1a2c26}
  .ctx button.danger{color:#d98b7a}
  .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:30;display:flex;align-items:center;justify-content:center;padding:16px}
  .modal{background:var(--forest2);border:1px solid var(--line);border-radius:14px;padding:22px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto}
  .modal h3{margin:0 0 14px;font-size:18px}
  .field{margin-bottom:10px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
  .field input,.field select{width:100%;background:var(--forest);border:1px solid var(--line);border-radius:8px;padding:9px 11px;color:var(--cream);font-size:14px}
  .row2{display:flex;gap:8px}
  .mlist{max-height:180px;overflow-y:auto;border:1px solid var(--line);border-radius:8px;margin-top:4px}
  .mlist button{display:block;width:100%;text-align:left;background:none;border:none;border-bottom:1px solid var(--line);color:var(--cream);padding:9px 11px;font-size:14px;cursor:pointer}
  .mlist button:hover{background:#1a2c26}
  .preset{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .preset button{background:var(--forest);border:1px solid var(--line);color:var(--cream);border-radius:8px;padding:7px 11px;font-size:13px;cursor:pointer}
  .preset button:hover{border-color:var(--brass);color:var(--brass)}
  .mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .mhead h3{margin:0}
  .xbtn{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;padding:0 4px}
  .xbtn:hover{color:var(--cream)}
  .seg{display:flex;gap:6px}
  .seg button{flex:1;background:var(--forest);border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:8px;font-size:14px;cursor:pointer}
  .seg button.on{background:var(--brass);color:#1b1205;border-color:var(--brass);font-weight:700}
  .cal-items{max-height:80px;overflow-y:auto}
  .cal-items::-webkit-scrollbar{width:4px}
  .cal-items::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px}
  .morebtn{display:block;width:100%;background:none;border:none;color:var(--brass);font-size:10px;cursor:pointer;margin-top:2px;text-align:left;padding:1px 4px}
  .morebtn:hover{text-decoration:underline}
  .mtitle-btn{background:none;border:none;color:var(--cream);font-size:20px;font-weight:800;cursor:pointer;min-width:150px;text-align:center}
  .mtitle-btn:hover{color:var(--brass)}
  .picker{position:absolute;top:46px;left:50%;transform:translateX(-50%);background:var(--forest2);border:1px solid var(--line);border-radius:12px;padding:14px;z-index:45;box-shadow:0 12px 36px rgba(0,0,0,.55);width:280px}
  .picker-year{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:12px;font-size:18px;font-weight:800}
  .picker-year button{background:none;border:none;color:var(--brass);font-size:22px;cursor:pointer}
  .picker-months{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
  .picker-months button{background:var(--forest);border:1px solid var(--line);color:var(--cream);border-radius:8px;padding:9px 0;font-size:14px;cursor:pointer}
  .picker-months button:hover{border-color:var(--brass)}
  .picker-months button.on{background:var(--brass);color:#1b1205;font-weight:700}
  .locker-grid{display:grid;grid-auto-flow:column;grid-template-rows:repeat(7,1fr);grid-auto-columns:minmax(104px,1fr);gap:8px;margin-bottom:40px;overflow-x:auto;padding-bottom:8px}
  .locker{background:var(--forest2);border:1px solid var(--line);border-radius:10px;padding:9px 10px;min-height:74px;cursor:pointer}
  .locker:hover{border-color:var(--brass)}
  .locker.활성{border-left:3px solid #5a9e7a}
  .locker.임박{border-left:3px solid #e0a23c}
  .locker.만료{border-left:3px solid #c4624f}
  .locker.고장{border-left:3px solid #d9a44f}
  .locker.empty{display:flex;align-items:center;justify-content:space-between;color:var(--muted)}
  /* 회원목록 선택 액션바 (BroJ 스타일 하단 플로팅) */
  .selbar{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;z-index:15;display:flex;align-items:center;gap:12px;
    background:var(--forest2);border:1px solid var(--brass-dim);border-radius:12px;padding:10px 16px;box-shadow:0 10px 34px rgba(0,0,0,.55)}
  .selbar .cnt{font-size:14px;font-weight:700}
  .btn.danger{background:var(--danger);color:#fff}
  .btn.ghost.danger{background:transparent;border:1px solid rgba(196,98,79,.5);color:#d98b7a}
  /* 락커 지정 모달 그리드 (BroJ '락커 수정' 스타일) */
  .lkpick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(54px,1fr));gap:6px;max-height:300px;overflow-y:auto;margin:4px 0 12px}
  .lkpick{position:relative;border:1px solid var(--line);background:var(--forest);color:var(--cream);border-radius:8px;
    padding:9px 2px 7px;font-size:13px;font-weight:700;cursor:pointer;text-align:center}
  .lkpick small{display:block;font-size:9px;font-weight:400;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lkpick.taken,.lkpick.broken{opacity:.45;cursor:not-allowed}
  .lkpick.broken{border-color:#d9a44f}
  .lkpick.mine{border-color:var(--brass);color:var(--brass)}
  .lkpick.sel{background:var(--brass);color:#1b1205;border-color:var(--brass)}
  .lkpick.sel small{color:#1b1205}
  .lk-legend{display:flex;gap:14px;font-size:12px;color:var(--muted);margin-bottom:10px}
  .lk-legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:-1px}
  /* 매출 통계 */
  .sales-nav{display:flex;align-items:center;justify-content:space-between;background:var(--forest2);border:1px solid var(--line);border-radius:12px;padding:12px 18px;margin:18px 0 16px}
  .sales-nav .per{font-size:18px;font-weight:800}
  .sales-nav button{background:none;border:none;color:var(--brass);font-size:14px;font-weight:700;cursor:pointer;padding:6px 10px;border-radius:8px}
  .sales-nav button:hover{background:var(--forest)}
  .saleschart{display:flex;align-items:flex-end;gap:3px;height:150px;padding-top:10px}
  .saleschart .bar{flex:1;min-width:6px;background:var(--brass-dim);border-radius:3px 3px 0 0;min-height:2px;transition:background .1s}
  .saleschart .bar:hover{background:var(--brass)}
